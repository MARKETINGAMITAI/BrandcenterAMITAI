  function setMode(selectedMode) {
    mode = selectedMode;

    document.getElementById("btnService").classList.toggle("active", mode === "service");
    document.getElementById("btnSolution").classList.toggle("active", mode === "solution");

    document.getElementById("serviceField").style.display = mode === "service" ? "block" : "none";
    document.getElementById("solutionField").style.display = mode === "solution" ? "block" : "none";

    updateSheet();
  }

  function getCurrentData() {
    if (mode === "service") {
      return serviceData[document.getElementById("serviceSelect").value];
    }

    return solutionData[document.getElementById("solutionSelect").value];
  }

  function updateSheet() {
    const data = getCurrentData();

    const prospect = document.getElementById("prospect").value;
    const objective = document.getElementById("objective").value;
    const customMessage = document.getElementById("customMessage").value;

    const sellerName = document.getElementById("sellerName").value;
    const sellerPosition = document.getElementById("sellerPosition").value;
    const sellerEmail = document.getElementById("sellerEmail").value;
    const sellerPhone = document.getElementById("sellerPhone").value;

    document.getElementById("sheetHero").style.background =
      `linear-gradient(135deg, ${data.color1} 0%, ${data.color2} 75%)`;

    document.getElementById("kicker").textContent = data.kicker;
    document.getElementById("sheetTitle").textContent = data.title;
    document.getElementById("sheetSubtitle").textContent = data.subtitle;

    const objectiveText = {
      primer: "Como primer acercamiento,",
      seguimiento: "Como seguimiento a nuestra conversación,",
      cierre: "Para avanzar hacia una propuesta concreta,"
    };

    document.getElementById("introText").textContent =
      `${objectiveText[objective]} compartimos esta ficha para ${prospect}. ${customMessage} ${data.intro}`;

    document.getElementById("benefits").innerHTML = data.benefits.map(item => `
      <div class="benefit">
        <strong>${item[0]}</strong>
        <span>${item[1]}</span>
      </div>
    `).join("");

    document.getElementById("servicesList").innerHTML = data.services.map(item => `
      <div class="service-item">
        <div class="dot" style="background:${data.color2};"></div>
        <div>
          <h4>${item[0]}</h4>
          <p>${item[1]}</p>
        </div>
      </div>
    `).join("");

    document.getElementById("ctaText").textContent =
      `Podemos revisar el caso de ${prospect} y proponer una ruta de implementación alineada a sus necesidades.`;

    document.getElementById("contactName").textContent = sellerName;
    document.getElementById("contactPosition").textContent = sellerPosition;
    document.getElementById("contactEmail").textContent = sellerEmail;
    document.getElementById("contactPhone").textContent = sellerPhone;

    saveData();
  }

  async function generatePDF() {
    showToast("Generando PDF...");

    const { jsPDF } = window.jspdf;
    const sheet = document.getElementById("salesSheet");

    const canvas = await html2canvas(sheet, {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff"
    });

    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF({
      orientation: "portrait",
      unit: "px",
      format: [816, 1056]
    });

    pdf.addImage(imgData, "PNG", 0, 0, 816, 1056);

    const type = mode === "service"
      ? document.getElementById("serviceSelect").value
      : document.getElementById("solutionSelect").value;

    const prospect = document.getElementById("prospect").value
      .toLowerCase()
      .replace(/\s+/g, "-")
      .replace(/[^a-z0-9áéíóúñ-]/gi, "");

    pdf.save(`sales-sheet-${type}-${prospect || "amitai"}.pdf`);

    showToast("PDF descargado");
  }

  function copyLink() {
    const params = new URLSearchParams();

    params.set("mode", mode);

    if (mode === "service") {
      params.set("service", document.getElementById("serviceSelect").value);
    } else {
      params.set("solution", document.getElementById("solutionSelect").value);
    }

    const url = `${window.location.origin}${window.location.pathname}?${params.toString()}`;

    navigator.clipboard.writeText(url);
    showToast("Link copiado");
  }

  function showToast(message) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.classList.add("show");

    setTimeout(() => {
      toast.classList.remove("show");
    }, 1800);
  }

  function saveData() {
    const data = {
      mode,
      service: document.getElementById("serviceSelect").value,
      solution: document.getElementById("solutionSelect").value,
      prospect: document.getElementById("prospect").value,
      objective: document.getElementById("objective").value,
      customMessage: document.getElementById("customMessage").value,
      sellerName: document.getElementById("sellerName").value,
      sellerPosition: document.getElementById("sellerPosition").value,
      sellerEmail: document.getElementById("sellerEmail").value,
      sellerPhone: document.getElementById("sellerPhone").value
    };

    localStorage.setItem("salesSheetData", JSON.stringify(data));
  }

  function loadData() {
    const saved = localStorage.getItem("salesSheetData");
    const params = new URLSearchParams(window.location.search);

    if (saved) {
      const data = JSON.parse(saved);

      if (data.service) document.getElementById("serviceSelect").value = data.service;
      if (data.solution) document.getElementById("solutionSelect").value = data.solution;
      if (data.prospect) document.getElementById("prospect").value = data.prospect;
      if (data.objective) document.getElementById("objective").value = data.objective;
      if (data.customMessage) document.getElementById("customMessage").value = data.customMessage;
      if (data.sellerName) document.getElementById("sellerName").value = data.sellerName;
      if (data.sellerPosition) document.getElementById("sellerPosition").value = data.sellerPosition;
      if (data.sellerEmail) document.getElementById("sellerEmail").value = data.sellerEmail;
      if (data.sellerPhone) document.getElementById("sellerPhone").value = data.sellerPhone;

      if (data.mode) mode = data.mode;
    }

    if (params.get("mode")) mode = params.get("mode");
    if (params.get("service")) document.getElementById("serviceSelect").value = params.get("service");
    if (params.get("solution")) document.getElementById("solutionSelect").value = params.get("solution");

    setMode(mode);
  }

  loadData();
</script>
